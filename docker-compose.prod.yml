# SmartClinic — production overrides for a single Linode VPS.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                  --env-file /opt/smartclinic/.env up -d
#
# What this file changes vs. docker-compose.yml:
#   - Services consume pre-built images from GHCR (no build on host).
#   - Host-port publishing is dropped for every service EXCEPT Caddy
#     (80, 443) and optional bastion ports — everything else is reachable
#     only over the internal compose network.
#   - Caddy fronts the Angular SPA and every API, terminating TLS via
#     Let's Encrypt and path-routing to the right service.
#   - Restart policy hardened; log rotation configured per service.
#   - Observability stack is in a `obs` profile so it can be disabled on
#     tiny instances (Grafana + Loki + Jaeger eat ~1.2 GB RAM).

name: smartclinic

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-app-common: &app-common
  restart: unless-stopped
  logging: *default-logging

services:
  # ── Reverse proxy (plain HTTP — IP-hosted demo) ────────────────────────
  caddy:
    image: caddy:2.8-alpine
    container_name: smartclinic-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DEPLOY_HOST: ${DEPLOY_HOST}
      GRAFANA_BASICAUTH_USER: ${GRAFANA_BASICAUTH_USER:-ops}
      GRAFANA_BASICAUTH_HASH: ${GRAFANA_BASICAUTH_HASH:-}
    depends_on:
      - patient_identity
      - scheduling
      - clinical
      - pharmacy
      - laboratory
      - billing
      - saga_orchestrator
      - frontend
    networks: [smartclinic]
    logging: *default-logging

  # -- Core infra: drop public ports in prod (internal only) --------------
  # Also cap CPU limits at 1.0 since small Linode VPSes may only have 1 vCPU
  # (Docker refuses to start a container whose cpus limit > host CPU count).
  postgres:
    image: postgres:16-alpine
    ports: !reset []
    <<: *app-common
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 768M }

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports: !reset []
    <<: *app-common
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }

  keycloak:
    ports: !reset []
    <<: *app-common
    # KC needs to know the public host. HTTP-only + IP = relax strict checks.
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: ${DEPLOY_HOST}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      # Caddy strips /auth and forwards to keycloak:8080, so Keycloak
      # must know its public base path is /auth (otherwise every redirect
      # it generates drops the prefix and Caddy cannot route it back).
      KC_HTTP_RELATIVE_PATH: /auth
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 768M }

  # ── Observability (optional — enable with `--profile obs`) ─────────────
  jaeger:
    profiles: ["obs"]
    ports: !reset []
    <<: *app-common

  prometheus:
    profiles: ["obs"]
    ports: !reset []
    <<: *app-common

  loki:
    profiles: ["obs"]
    ports: !reset []
    <<: *app-common

  # otel-collector stays always-on (not in obs profile) because every app
  # service has depends_on: otel-collector. ~50MB footprint is negligible.
  # When the obs profile is off, spans/metrics are buffered then dropped.
  otel-collector:
    ports: !reset []
    <<: *app-common

  grafana:
    profiles: ["obs"]
    ports: !reset []
    <<: *app-common

  # Dev inbox not deployed in prod — use an SMTP relay instead
  mailhog:
    profiles: ["disabled"]

  # ── Application services: replace build with GHCR image ────────────────
  patient_identity:
    build: !reset null
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/smartclinic-patient_identity:${IMAGE_TAG:-latest}
    ports: !reset []
    <<: *app-common

  scheduling:
    build: !reset null
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/smartclinic-scheduling:${IMAGE_TAG:-latest}
    ports: !reset []
    <<: *app-common

  clinical:
    build: !reset null
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/smartclinic-clinical:${IMAGE_TAG:-latest}
    ports: !reset []
    <<: *app-common

  pharmacy:
    build: !reset null
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/smartclinic-pharmacy:${IMAGE_TAG:-latest}
    ports: !reset []
    <<: *app-common

  laboratory:
    build: !reset null
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/smartclinic-laboratory:${IMAGE_TAG:-latest}
    ports: !reset []
    <<: *app-common

  billing:
    build: !reset null
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/smartclinic-billing:${IMAGE_TAG:-latest}
    ports: !reset []
    <<: *app-common

  saga_orchestrator:
    build: !reset null
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/smartclinic-saga_orchestrator:${IMAGE_TAG:-latest}
    ports: !reset []
    <<: *app-common

  frontend:
    build: !reset null
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/smartclinic-frontend:${IMAGE_TAG:-latest}
    ports: !reset []
    <<: *app-common

  # seeder inherits profiles: [seed] from the base compose file; run it in
  # prod with: docker compose ... --profile seed run --rm seeder

volumes:
  caddy-data:
  caddy-config:
