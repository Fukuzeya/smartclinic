name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.4.20"
  PYTHON_VERSION: "3.12"

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

  # ── 2. Type check ────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: mypy strict on shared_kernel
        run: uv run mypy libs/shared_kernel/src

  # ── 3. Unit tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests (no Docker required)
        run: |
          uv run pytest \
            -m "not integration" \
            --cov \
            --cov-report=xml \
            --cov-report=term-missing \
            -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          flags: unit
          fail_ci_if_error: false

  # ── 4. Fitness functions ─────────────────────────────────────────────────────
  fitness:
    name: Architecture fitness functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run fitness functions
        run: uv run pytest -m fitness -q --tb=short

  # ── 5. Integration tests ─────────────────────────────────────────────────────
  integration-tests:
    name: Integration tests (testcontainers)
    runs-on: ubuntu-latest
    # Integration tests only run on push to main/develop, not on every PR
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run integration tests
        run: |
          uv run pytest \
            -m integration \
            --cov \
            --cov-report=xml \
            -q

  # ── 6. Docker build check ────────────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    # Only build affected services based on changed paths
    strategy:
      fail-fast: false
      matrix:
        service:
          - clinical
          - pharmacy
          - laboratory
          - billing
          - saga_orchestrator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          tags: smartclinic/${{ matrix.service }}:ci

  # ── 7. Stack smoke test ───────────────────────────────────────────────────────
  stack-smoke:
    name: Stack smoke test (infra only)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Start infrastructure services
        run: |
          docker compose up -d postgres rabbitmq
          docker compose wait postgres rabbitmq || true

      - name: Wait for Postgres
        run: |
          timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U postgres; do sleep 2; done'

      - name: Wait for RabbitMQ
        run: |
          timeout 60 bash -c 'until docker compose exec -T rabbitmq rabbitmq-diagnostics -q ping; do sleep 3; done'

      - name: Verify RabbitMQ topology
        run: |
          docker compose exec -T rabbitmq rabbitmqctl list_queues name | grep -q "saga.all.events"
          docker compose exec -T rabbitmq rabbitmqctl list_exchanges name | grep -q "smartclinic.events"
          echo "RabbitMQ topology verified"

      - name: Tear down
        if: always()
        run: docker compose down -v
