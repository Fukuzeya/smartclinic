name: Deploy to Linode

# Builds all service images, publishes them to GitHub Container Registry (GHCR),
# then SSHes into the Linode host and runs the deploy script.
#
# Triggers:
#   - push to main (auto-deploy)
#   - manual (workflow_dispatch) — useful for rollback / hotfix

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to the commit SHA). Use an older SHA to roll back."
        required: false
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight deploy

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  IMAGE_NAME_PREFIX: smartclinic

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ── 1. Build + push all images in parallel ────────────────────────────────
  build-push:
    name: Build & push · ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: patient_identity
            dockerfile: services/patient_identity/Dockerfile
          - service: scheduling
            dockerfile: services/scheduling/Dockerfile
          - service: clinical
            dockerfile: services/clinical/Dockerfile
          - service: pharmacy
            dockerfile: services/pharmacy/Dockerfile
          - service: laboratory
            dockerfile: services/laboratory/Dockerfile
          - service: billing
            dockerfile: services/billing/Dockerfile
          - service: saga_orchestrator
            dockerfile: services/saga_orchestrator/Dockerfile
          - service: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── 2. Deploy to Linode over SSH ──────────────────────────────────────────
  deploy:
    name: Deploy to Linode
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: production
    steps:
      - name: Resolve image tag
        id: tag
        run: |
          echo "sha=${{ github.event.inputs.image_tag || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: SSH - pull images, run migrations, rolling restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 15m
          envs: IMAGE_TAG,IMAGE_OWNER,REGISTRY
          script: |
            set -euo pipefail
            export IMAGE_TAG="${{ steps.tag.outputs.sha }}"
            # GHCR image names must be lowercase; github.repository_owner may be mixed-case.
            export IMAGE_OWNER="$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')"
            export REGISTRY="${{ env.REGISTRY }}"
            cd /opt/smartclinic
            # Non-destructive pull of latest deploy/compose files
            git fetch --all --prune
            git reset --hard origin/main
            # Hand off to the server-side deploy script
            bash ./ops/deploy/deploy.sh

      - name: Smoke-test the public endpoint
        run: |
          set -e
          for i in {1..30}; do
            if curl -fsS "http://${{ secrets.DEPLOY_HOST }}/health" > /dev/null; then
              echo "✓ health endpoint is up"
              exit 0
            fi
            echo "waiting for health endpoint ($i/30)..."
            sleep 5
          done
          echo "✗ health endpoint did not come up in time" >&2
          exit 1

  # ── 3. Notify on failure (optional — uses GitHub issue as the pager) ──────
  notify-failure:
    name: Open issue on failed deploy
    needs: [build-push, deploy]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha.substring(0, 7);
            await github.rest.issues.create({
              owner, repo,
              title: `Deploy failed · ${sha}`,
              body: `Deployment of \`${context.sha}\` to production failed.\n\nRun: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              labels: ['deploy-failure']
            });
