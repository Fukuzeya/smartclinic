# SmartClinic frontend nginx — SPA server + API reverse proxy.
#
# All /api/<service>/* calls are forwarded to the matching microservice
# container on the internal Docker network, stripping the /api/<service>
# prefix so each FastAPI service sees its own natural path structure.
#
# Keycloak is accessed directly at localhost:8080 from the browser.

upstream patient_identity  { server patient_identity:8000; }
upstream scheduling        { server scheduling:8000; }
upstream clinical          { server clinical:8000; }
upstream pharmacy          { server pharmacy:8000; }
upstream laboratory        { server laboratory:8000; }
upstream billing           { server billing:8000; }
upstream saga_orchestrator { server saga_orchestrator:8000; }

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml text/xml image/svg+xml;

    # ── API proxy ────────────────────────────────────────────────────────
    # Each location strips its prefix and forwards to the right service.
    # e.g.  GET /api/patients/abc  →  patient_identity:8000/patients/abc

    location /api/patients {
        rewrite ^/api/patients(.*)$ $1 break;
        proxy_pass http://patient_identity;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/scheduling {
        rewrite ^/api/scheduling(.*)$ $1 break;
        proxy_pass http://scheduling;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/clinical {
        rewrite ^/api/clinical(.*)$ $1 break;
        proxy_pass http://clinical;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/pharmacy {
        rewrite ^/api/pharmacy(.*)$ $1 break;
        proxy_pass http://pharmacy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/laboratory {
        rewrite ^/api/laboratory(.*)$ $1 break;
        proxy_pass http://laboratory;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/billing {
        rewrite ^/api/billing(.*)$ $1 break;
        proxy_pass http://billing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/saga {
        rewrite ^/api/saga(.*)$ $1 break;
        proxy_pass http://saga_orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Angular SPA ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed bundles for 1 year — Angular CLI adds content hash.
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache index.html — it references the latest bundle hashes.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
