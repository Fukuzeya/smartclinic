# SmartClinic — Prometheus scrape configuration.
#
# Two classes of targets:
#
#   1. The OpenTelemetry Collector, which re-exposes the aggregated metrics
#      of every service on :8889/metrics (resource attributes → labels).
#   2. Each FastAPI service's own /metrics endpoint (direct scrape). Direct
#      scraping is kept as a belt-and-braces for low-level RED signals that
#      we never want to lose if the collector is the thing that's down.
#
# Jobs are named after the bounded context so dashboards can filter cleanly.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    deployment_environment: dev
    cluster: smartclinic-local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          component: otel-collector

  - job_name: otel-collector-self
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          component: otel-collector-self

  - job_name: patient_identity
    metrics_path: /metrics
    static_configs:
      - targets: ["patient_identity:8000"]
        labels:
          service_name: patient_identity
          bounded_context: patient_identity

  - job_name: scheduling
    metrics_path: /metrics
    static_configs:
      - targets: ["scheduling:8000"]
        labels:
          service_name: scheduling
          bounded_context: scheduling

  - job_name: clinical
    metrics_path: /metrics
    static_configs:
      - targets: ["clinical:8000"]
        labels:
          service_name: clinical
          bounded_context: clinical

  - job_name: pharmacy
    metrics_path: /metrics
    static_configs:
      - targets: ["pharmacy:8000"]
        labels:
          service_name: pharmacy
          bounded_context: pharmacy

  - job_name: laboratory
    metrics_path: /metrics
    static_configs:
      - targets: ["laboratory:8000"]
        labels:
          service_name: laboratory
          bounded_context: laboratory

  - job_name: billing
    metrics_path: /metrics
    static_configs:
      - targets: ["billing:8000"]
        labels:
          service_name: billing
          bounded_context: billing

  - job_name: saga_orchestrator
    metrics_path: /metrics
    static_configs:
      - targets: ["saga_orchestrator:8000"]
        labels:
          service_name: saga_orchestrator
          bounded_context: saga

  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15692"]
        labels:
          component: rabbitmq

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          component: postgres
