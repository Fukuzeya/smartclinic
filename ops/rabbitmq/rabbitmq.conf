## SmartClinic RabbitMQ runtime configuration.
##
## Keep this minimal — topology (exchanges, queues, bindings) lives in
## definitions.json which is imported declaratively at broker boot.

listeners.tcp.default = 5672
management.tcp.port = 15672

## Declarative definitions import on startup.
management.load_definitions = /etc/rabbitmq/definitions.json

## Safer defaults for a shared dev broker.
heartbeat = 60
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute = 200MB

## Faster log turn-over in dev.
log.console = true
log.console.level = info
