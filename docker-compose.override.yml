# SmartClinic — developer-local overrides.
#
# Picked up automatically by `docker compose up`. Two things it does:
#   1. Bind-mounts the source tree so code changes are visible instantly.
#   2. Switches uvicorn to --reload mode.
#
# NOTE: uvicorn is called directly (not via `uv run`) because the runtime
# image activates the venv via PATH; `uv` itself is not present at runtime.

services:
  patient_identity:
    volumes:
      - ./libs/shared_kernel:/app/libs/shared_kernel
      - ./services/patient_identity:/app/services/patient_identity
    environment:
      LOG_LEVEL: DEBUG
    command: >
      uvicorn patient_identity.main:app
      --host 0.0.0.0 --port 8000
      --reload --reload-dir /app/libs/shared_kernel/src
      --reload-dir /app/services/patient_identity/src

  scheduling:
